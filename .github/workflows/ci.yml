name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop/*

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - name: Create devserver static placeholder
        run: mkdir -p cmd/devserver/static/assets && echo "placeholder" > cmd/devserver/static/assets/placeholder.txt
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - name: Create devserver static placeholder
        run: mkdir -p cmd/devserver/static/assets && echo "placeholder" > cmd/devserver/static/assets/placeholder.txt
      - run: go test ./...

  e2e:
    name: Wails E2E
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            e2e/pnpm-lock.yaml
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Cache Wails CLI
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-cli-${{ runner.os }}-v2.12.0
      - name: Install Wails CLI
        run: command -v wails || go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/pnpm-lock.yaml') }}
      - name: Install e2e dependencies
        run: cd e2e && pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium
      - name: Test
        run: xvfb-run -a make test-e2e
      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wails-e2e-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
            /tmp/opskat-e2e-webserver.log
          if-no-files-found: ignore

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Lint
        run: cd frontend && pnpm run lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Cache Wails CLI
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-cli-${{ runner.os }}-v2.12.0
      - name: Install Wails CLI
        run: command -v wails || go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - name: Generate Wails bindings
        run: wails generate module
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Test
        run: cd frontend && pnpm run test
